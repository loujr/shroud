name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run tarpaulin
        id: tarpaulin
        run: |
          set +e
          cargo tarpaulin \
            --verbose \
            --all-features \
            --workspace \
            --timeout 300 \
            --out xml \
            --out html \
            --output-dir coverage \
            --skip-clean \
            --ignore-tests \
            2>&1 | tee tarpaulin-output.txt
          TARP_EXIT=$?
          set -e

          if grep -q "test result: ok" tarpaulin-output.txt; then
            echo "Tests passed, coverage generated"
            echo "status=success" >> $GITHUB_OUTPUT
          elif grep -q "test result: FAILED" tarpaulin-output.txt; then
            echo "Tests actually failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "Tarpaulin completed with exit code $TARP_EXIT"
            echo "status=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
        if: always()

      - name: Upload tarpaulin log
        uses: actions/upload-artifact@v4
        with:
          name: tarpaulin-output
          path: tarpaulin-output.txt
          retention-days: 7
        if: always()
