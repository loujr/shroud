name: pkg-build

# Validates pkg/build.sh - the source-project contract that lousclues-pkg
# invokes inside per-distro containers to produce .deb / .rpm artifacts.
#
# Three layers, fastest first:
#   1. lint         - shellcheck + bash -n. Always runs.
#   2. input-tests  - negative tests for the script's input handling.
#                     Always runs. ~10s.
#   3. build        - real container build per supported distro, gated on
#                     paths that actually affect packaging.

on:
  pull_request:
    paths:
      - 'pkg/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'assets/**'
      - 'autostart/**'
      - '.github/workflows/pkg-build.yml'
  push:
    branches: [main]
    paths:
      - 'pkg/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'assets/**'
      - 'autostart/**'
      - '.github/workflows/pkg-build.yml'
  workflow_dispatch:

concurrency:
  group: pkg-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Layer 1 - Lint
  # ===========================================================================
  lint:
    name: Lint pkg/build.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: shellcheck
        run: shellcheck -x pkg/build.sh
      - name: bash -n syntax check
        run: bash -n pkg/build.sh

  # ===========================================================================
  # Layer 2 - Input validation tests (cheap, always runs)
  # ===========================================================================
  input-tests:
    name: Input validation tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Resolve real Cargo.toml version
        id: ver
        run: |
          ACTUAL=$(awk -F\" '/^version[[:space:]]*=/ { print $2; exit }' Cargo.toml)
          echo "actual=$ACTUAL" >> "$GITHUB_OUTPUT"
      - name: Run negative tests
        env:
          ACTUAL: ${{ steps.ver.outputs.actual }}
        run: |
          set -u
          PASS=0
          FAIL=0
          run_test() {
              local name="$1" expected="$2"
              shift 2
              local out rc
              out=$("$@" 2>&1) && rc=0 || rc=$?
              if [[ "$rc" -eq "$expected" ]]; then
                  echo "  PASS  $name (exit $rc)"
                  PASS=$((PASS+1))
              else
                  echo "  FAIL  $name (got $rc, want $expected)"
                  echo "------ output ------"
                  echo "$out"
                  echo "--------------------"
                  FAIL=$((FAIL+1))
              fi
          }

          # Each negative case the script must reject before doing work.
          run_test "missing DISTRO"      1 env -u DISTRO VERSION="$ACTUAL" OUTDIR=/tmp/out bash pkg/build.sh
          run_test "missing VERSION"     1 env -u VERSION DISTRO=noble OUTDIR=/tmp/out bash pkg/build.sh
          run_test "missing OUTDIR"      1 env -u OUTDIR DISTRO=noble VERSION="$ACTUAL" bash pkg/build.sh
          run_test "unknown DISTRO"      2 env DISTRO=arch VERSION="$ACTUAL" OUTDIR=/tmp/out bash pkg/build.sh
          run_test "leading 'v' in VER"  2 env DISTRO=noble VERSION="v$ACTUAL" OUTDIR=/tmp/out bash pkg/build.sh
          run_test "relative OUTDIR"     2 env DISTRO=noble VERSION="$ACTUAL" OUTDIR=relative/out bash pkg/build.sh
          run_test "VERSION mismatch"    2 env DISTRO=noble VERSION=99.99.99  OUTDIR=/tmp/out bash pkg/build.sh

          echo
          echo "RESULT: $PASS passed, $FAIL failed"
          [[ "$FAIL" -eq 0 ]]

  # ===========================================================================
  # Layer 3 - Real container build per supported distro
  # ===========================================================================
  build:
    name: Build (${{ matrix.distro }})
    needs: [lint, input-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: noble
            image: ubuntu:24.04
            ext: deb
          - distro: jammy
            image: ubuntu:22.04
            ext: deb
          - distro: bookworm
            image: debian:12
            ext: deb
          - distro: el9
            image: rockylinux:9
            ext: rpm
          - distro: fedora
            image: fedora:latest
            ext: rpm
    container:
      image: ${{ matrix.image }}
    # GitHub Actions defaults to /bin/sh inside containers; force bash so
    # the [[ ... ]] conditionals in run: blocks work consistently.
    defaults:
      run:
        shell: bash
    steps:
      # actions/checkout needs git on the container PATH for some images;
      # install it before the checkout step where missing. Bootstrap runs
      # before `defaults.run.shell` can apply (bash may not be on PATH yet
      # in the most minimal images), so keep these POSIX-compatible.
      - name: Bootstrap checkout deps (deb)
        if: matrix.ext == 'deb'
        shell: sh
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq -o Acquire::Languages=none
          apt-get install -y -qq --no-install-recommends \
              ca-certificates git curl bash
      - name: Bootstrap checkout deps (rpm)
        if: matrix.ext == 'rpm'
        shell: sh
        run: |
          # --allowerasing lets dnf swap curl-minimal (preinstalled on
          # Rocky 9 / Fedora) for the full curl package without erroring.
          dnf install -y -q --allowerasing \
              --setopt=install_weak_deps=False \
              --setopt=tsflags=nodocs \
              ca-certificates git curl bash

      - uses: actions/checkout@v4

      - name: Trust workspace checkout
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve version from Cargo.toml
        id: ver
        run: |
          VER=$(awk -F\" '/^version[[:space:]]*=/ { print $2; exit }' Cargo.toml)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          EPOCH=$(git log -1 --pretty=%ct 2>/dev/null || echo 1700000000)
          echo "epoch=$EPOCH" >> "$GITHUB_OUTPUT"
          echo "Building shroud $VER for ${{ matrix.distro }}"

      - name: Run pkg/build.sh
        env:
          DISTRO: ${{ matrix.distro }}
          VERSION: ${{ steps.ver.outputs.version }}
          OUTDIR: ${{ github.workspace }}/out
          SOURCE_DATE_EPOCH: ${{ steps.ver.outputs.epoch }}
          SHROUD_MANIFEST_COMMIT: ${{ github.sha }}
          # Honour the script's documented opt-out for callers that
          # already prepared the toolchain. We still let the script
          # install rustup + fpm so the contract is exercised end-to-end.
        run: bash pkg/build.sh

      - name: Reproducibility check
        env:
          DISTRO: ${{ matrix.distro }}
          VERSION: ${{ steps.ver.outputs.version }}
          OUTDIR: ${{ github.workspace }}/out2
          SOURCE_DATE_EPOCH: ${{ steps.ver.outputs.epoch }}
          SHROUD_MANIFEST_COMMIT: ${{ github.sha }}
        run: |
          bash pkg/build.sh

          FIRST=$(find out -maxdepth 1 -type f -name "*.${{ matrix.ext }}")
          SECOND=$(find out2 -maxdepth 1 -type f -name "*.${{ matrix.ext }}")
          sha256sum "$FIRST" "$SECOND"

          FIRST_SHA=$(sha256sum "$FIRST" | awk '{print $1}')
          SECOND_SHA=$(sha256sum "$SECOND" | awk '{print $1}')
          if [[ "$FIRST_SHA" != "$SECOND_SHA" ]]; then
              mkdir -p repro-failure
              cp "$FIRST" "repro-failure/first-$(basename "$FIRST")"
              cp "$SECOND" "repro-failure/second-$(basename "$SECOND")"
              echo "build is not reproducible"
              exit 1
          fi

      - name: Upload reproducibility failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shroud-${{ matrix.distro }}-repro-failure
          path: repro-failure/*
          if-no-files-found: ignore
          retention-days: 14

      - name: Verify exactly one artifact
        run: |
          COUNT=$(find out -maxdepth 1 -type f -name "*.${{ matrix.ext }}" | wc -l)
          if [[ "$COUNT" -ne 1 ]]; then
              echo "ERROR: expected exactly 1 .${{ matrix.ext }}, found $COUNT"
              ls -la out
              exit 1
          fi
          ARTIFACT=$(find out -maxdepth 1 -type f -name "*.${{ matrix.ext }}")
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

          MANIFEST_COUNT=$(find out -maxdepth 1 -type f -name "*.${{ matrix.ext }}.manifest.json" | wc -l)
          if [[ "$MANIFEST_COUNT" -ne 1 ]]; then
              echo "ERROR: expected exactly 1 manifest sidecar, found $MANIFEST_COUNT"
              ls -la out
              exit 1
          fi
          MANIFEST="${ARTIFACT}.manifest.json"
          test -f "$MANIFEST" || { echo "missing: $MANIFEST"; exit 1; }
          echo "MANIFEST=$MANIFEST" >> "$GITHUB_ENV"

          ARTIFACT_SHA=$(sha256sum "$ARTIFACT" | awk '{print $1}')
          MANIFEST_SHA=$(sed -n 's/^  "sha256": "\([0-9a-f]\{64\}\)",$/\1/p' "$MANIFEST")
          if [[ -z "$MANIFEST_SHA" ]]; then
              echo "manifest sha256 is missing or malformed"
              cat "$MANIFEST"
              exit 1
          fi
          if [[ "$ARTIFACT_SHA" != "$MANIFEST_SHA" ]]; then
              echo "manifest sha256 mismatch"
              echo "artifact: $ARTIFACT_SHA"
              echo "manifest: $MANIFEST_SHA"
              exit 1
          fi

          MANIFEST_COMMIT=$(sed -n 's/^  "git_commit": "\([0-9a-f]\{40\}\)"$/\1/p' "$MANIFEST")
          if [[ -z "$MANIFEST_COMMIT" ]]; then
              echo "manifest git_commit is missing or malformed"
              cat "$MANIFEST"
              exit 1
          fi

          MANIFEST_VERSION=$(sed -n 's/^  "version": "\([^"]*\)",$/\1/p' "$MANIFEST")
          if [[ "$MANIFEST_VERSION" != "${{ steps.ver.outputs.version }}" ]]; then
              echo "manifest version mismatch: $MANIFEST_VERSION vs ${{ steps.ver.outputs.version }}"
              exit 1
          fi

      - name: Inspect .deb contents
        if: matrix.ext == 'deb'
        run: |
          echo "::group::dpkg-deb --info"
          dpkg-deb --info "$ARTIFACT"
          echo "::endgroup::"
          echo "::group::dpkg-deb --contents"
          dpkg-deb --contents "$ARTIFACT"
          echo "::endgroup::"

      - name: Inspect .rpm contents
        if: matrix.ext == 'rpm'
        run: |
          echo "::group::rpm -qip"
          rpm -qip "$ARTIFACT"
          echo "::endgroup::"
          echo "::group::rpm -qlp"
          rpm -qlp "$ARTIFACT"
          echo "::endgroup::"

      - name: Install artifact in container (smoke)
        run: |
          if [[ "${{ matrix.ext }}" == "deb" ]]; then
              # Ubuntu/Debian slim base images ship
              # /etc/dpkg/dpkg.cfg.d/excludes which strips /usr/share/doc/*
              # (and /usr/share/man/*, locales, etc.) to keep image size
              # down. That exclude applies at dpkg install time, so docs
              # we deliberately package would be silently dropped here
              # and the layout-verify step below would fail spuriously.
              # Real end-user systems don't ship this exclude, so the
              # package itself is correct. We just neutralise the
              # exclude for the CI smoke install.
              rm -f /etc/dpkg/dpkg.cfg.d/excludes
              # --force-depends because runtime deps like network-manager
              # aren't required to be present in the build container.
              # we only want to validate the package layout installs.
              dpkg -i --force-depends "$ARTIFACT"
              test $? -eq 0
          else
              rpm -i --nodeps "$ARTIFACT"
              test $? -eq 0
          fi

      - name: Verify installed layout
        run: |
          set -e
          test -x /usr/bin/shroud                                       || { echo "missing: /usr/bin/shroud";                                       exit 1; }
          test -f /etc/sudoers.d/shroud                                 || { echo "missing: /etc/sudoers.d/shroud";                                 exit 1; }
          test -f /usr/share/applications/shroud.desktop                || { echo "missing: /usr/share/applications/shroud.desktop";                exit 1; }
          test -f /usr/share/polkit-1/actions/com.shroud.killswitch.policy \
              || { echo "missing: polkit policy"; exit 1; }
          test -f /usr/share/doc/shroud/README.md                       || { echo "missing: README under /usr/share/doc/shroud"; exit 1; }
          if [[ "${{ matrix.ext }}" == "deb" ]]; then
              test -f /usr/share/doc/shroud/copyright                   || { echo "missing: Debian copyright file"; exit 1; }
          else
              test -f /usr/share/doc/shroud/LICENSE                     || { echo "missing: RPM LICENSE file"; exit 1; }
          fi
          # Systemd unit lives in distro-appropriate path
          if [[ -f /lib/systemd/system/shroud.service ]]; then
              UNIT=/lib/systemd/system/shroud.service
          elif [[ -f /usr/lib/systemd/system/shroud.service ]]; then
              UNIT=/usr/lib/systemd/system/shroud.service
          else
              echo "missing: shroud.service in /lib or /usr/lib systemd dirs"
              exit 1
          fi
          # Unit must not still reference the dev-only /usr/local/bin path
          if grep -q '/usr/local/bin/shroud' "$UNIT"; then
              echo "regression: $UNIT still references /usr/local/bin/shroud"
              exit 1
          fi
          # Sudoers file must be mode 0440 (sudo refuses to load otherwise)
          MODE=$(stat -c %a /etc/sudoers.d/shroud)
          if [[ "$MODE" != "440" ]]; then
              echo "regression: /etc/sudoers.d/shroud mode is $MODE, expected 440"
              exit 1
          fi
          # Binary actually runs (CLI parser smoke; --help must not require runtime deps)
          /usr/bin/shroud --help >/dev/null
          echo "Layout OK on ${{ matrix.distro }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shroud-${{ matrix.distro }}-${{ matrix.ext }}
          path: |
            out/*.${{ matrix.ext }}
            out/*.${{ matrix.ext }}.manifest.json
          if-no-files-found: error
          retention-days: 14

  # ===========================================================================
  # Aggregate gate so branch protection can require a single check.
  # ===========================================================================
  pkg-success:
    name: pkg-build success
    needs: [lint, input-tests, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}"        != "success" ]] || \
             [[ "${{ needs.input-tests.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}"       != "success" ]]; then
              echo "One or more pkg-build jobs failed"
              exit 1
          fi
          echo "pkg-build: all jobs green"
