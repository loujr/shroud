# SPDX-License-Identifier: GPL-3.0-or-later
#
# pkg-build.yml -- packaging-contract gate for shroud.
#
# Validates pkg/build.sh -- the source-project contract that
# lousclues-pkg invokes at release time to produce signed
# .deb and .rpm artifacts. Three layers, fastest first:
#   1. lint         -- shellcheck + bash -n, ~seconds.
#   2. input-tests  -- pkg/build.sh refusal paths, ~seconds.
#   3. build        -- per-distro container build + install
#                       smoke + installed-layout assertions
#                       + reproducibility check on non-PR (~minutes).
#
# Aggregate gate: `pkg-success`. Single required check for
# branch protection.
#
# Pattern adopted from lousclues-labs/vigil's pkg-build.yml.
# Shroud-specific adaptations:
#   * One binary (shroud), not vigil's two.
#   * Sudoers + polkit privilege model, not file caps.
#   * Desktop file + update-desktop-database in postinst.
#
# Out of scope: signing, publishing, AUR, cross-arch.

name: pkg-build

on:
  pull_request:
    paths:
      - 'pkg/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'assets/**'
      - 'autostart/**'
      - '.github/workflows/pkg-build.yml'
  push:
    branches: [main]
    paths:
      - 'pkg/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'assets/**'
      - 'autostart/**'
      - '.github/workflows/pkg-build.yml'
  workflow_dispatch:

concurrency:
  group: pkg-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # =========================================================================
  # Layer 1 -- Lint
  # =========================================================================
  lint:
    name: Lint pkg/build.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: shellcheck
        run: shellcheck -x pkg/build.sh
      - name: bash -n syntax check
        run: bash -n pkg/build.sh

  # =========================================================================
  # Layer 2 -- Input validation tests
  # =========================================================================
  input-tests:
    name: Input validation tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Resolve real Cargo.toml version
        id: ver
        run: |
          ACTUAL=$(awk -F\" '/^version[[:space:]]*=/ { print $2; exit }' Cargo.toml)
          echo "actual=$ACTUAL" >> "$GITHUB_OUTPUT"
      - name: Run negative tests
        env:
          ACTUAL: ${{ steps.ver.outputs.actual }}
        run: |
          set -u
          PASS=0
          FAIL=0
          check() {
            local label="$1" expected="$2"; shift 2
            [ "$1" = "--" ] && shift
            local actual=0
            ( "$@" ) >/dev/null 2>&1 || actual=$?
            if [ "$actual" -eq "$expected" ]; then
              echo "PASS  $label (exit $actual)"
              PASS=$((PASS+1))
            else
              echo "FAIL  $label (expected $expected, got $actual)"
              FAIL=$((FAIL+1))
            fi
          }

          OUT=/tmp/out

          check "missing DISTRO"        1 -- env -u DISTRO  VERSION="$ACTUAL"  OUTDIR="$OUT"      bash pkg/build.sh
          check "missing VERSION"       1 -- env -u VERSION DISTRO=noble       OUTDIR="$OUT"      bash pkg/build.sh
          check "missing OUTDIR"        1 -- env -u OUTDIR  DISTRO=noble       VERSION="$ACTUAL" bash pkg/build.sh
          check "unknown DISTRO arch"   2 -- env DISTRO=arch   VERSION="$ACTUAL" OUTDIR="$OUT" bash pkg/build.sh
          check "unknown DISTRO gentoo" 2 -- env DISTRO=gentoo VERSION="$ACTUAL" OUTDIR="$OUT" bash pkg/build.sh
          check "leading 'v' in VER"    2 -- env DISTRO=noble VERSION="v$ACTUAL" OUTDIR="$OUT" bash pkg/build.sh
          check "relative OUTDIR"       2 -- env DISTRO=noble VERSION="$ACTUAL" OUTDIR=relative/out bash pkg/build.sh
          check "VERSION mismatch"      2 -- env DISTRO=noble VERSION=99.99.99  OUTDIR="$OUT" bash pkg/build.sh

          echo
          echo "RESULT: $PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ]

  # =========================================================================
  # Layer 3 -- Real container build per supported distro
  # =========================================================================
  build:
    name: Build (${{ matrix.distro }})
    needs: [lint, input-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: noble
            image: ubuntu:24.04
            ext: deb
          - distro: jammy
            image: ubuntu:22.04
            ext: deb
          - distro: bookworm
            image: debian:12
            ext: deb
          - distro: el9
            image: rockylinux:9
            ext: rpm
          - distro: fedora
            image: fedora:latest
            ext: rpm
    container:
      image: ${{ matrix.image }}
    # GitHub Actions defaults to /bin/sh inside containers; force bash so
    # the [[ ... ]] conditionals in run: blocks work consistently.
    defaults:
      run:
        shell: bash
    steps:
      # actions/checkout needs git on the container PATH for some images;
      # install it before the checkout step where missing. Bootstrap runs
      # before `defaults.run.shell` can apply (bash may not be on PATH yet
      # in the most minimal images), so keep these POSIX-compatible.
      - name: Bootstrap checkout deps (deb)
        if: matrix.ext == 'deb'
        shell: sh
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
              ca-certificates git curl bash jq
      - name: Bootstrap checkout deps (rpm)
        if: matrix.ext == 'rpm'
        shell: sh
        run: |
          # --allowerasing lets dnf swap curl-minimal (preinstalled on
          # Rocky 9 / Fedora) for the full curl package without erroring.
          dnf install -y -q --allowerasing \
              --setopt=install_weak_deps=False \
              ca-certificates git curl bash jq

      - uses: actions/checkout@v4

      - name: cache cargo registry + git index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      - name: cache cargo target dir
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-target-${{ matrix.distro }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain*', 'Cargo.toml') }}
          restore-keys: |
            cargo-target-${{ matrix.distro }}-

      - name: Resolve version + SOURCE_DATE_EPOCH
        id: ver
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          VER=$(awk -F\" '/^version[[:space:]]*=/ { print $2; exit }' Cargo.toml)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          EPOCH=$(git log -1 --pretty=%ct 2>/dev/null || echo 1700000000)
          echo "epoch=$EPOCH" >> "$GITHUB_OUTPUT"
          echo "Building shroud $VER for ${{ matrix.distro }}"

      - name: Run pkg/build.sh
        env:
          DISTRO: ${{ matrix.distro }}
          VERSION: ${{ steps.ver.outputs.version }}
          OUTDIR: ${{ github.workspace }}/out
          SOURCE_DATE_EPOCH: ${{ steps.ver.outputs.epoch }}
          SHROUD_MANIFEST_COMMIT: ${{ github.sha }}
        run: bash pkg/build.sh

      - name: Reproducibility check
        id: repro
        if: github.event_name != 'pull_request'
        env:
          DISTRO: ${{ matrix.distro }}
          VERSION: ${{ steps.ver.outputs.version }}
          OUTDIR: ${{ github.workspace }}/out2
          SOURCE_DATE_EPOCH: ${{ steps.ver.outputs.epoch }}
          SHROUD_MANIFEST_COMMIT: ${{ github.sha }}
        run: |
          bash pkg/build.sh

          FIRST=$(find out  -maxdepth 1 -type f -name "*.${{ matrix.ext }}")
          SECOND=$(find out2 -maxdepth 1 -type f -name "*.${{ matrix.ext }}")
          sha256sum "$FIRST" "$SECOND"

          FIRST_SHA=$(sha256sum "$FIRST"  | awk '{print $1}')
          SECOND_SHA=$(sha256sum "$SECOND" | awk '{print $1}')
          if [ "$FIRST_SHA" != "$SECOND_SHA" ]; then
              mkdir -p repro-failure
              cp "$FIRST"  "repro-failure/first-$(basename "$FIRST")"
              cp "$SECOND" "repro-failure/second-$(basename "$SECOND")"
              echo "repro=fail" >> "$GITHUB_OUTPUT"
              echo "::error::build is not reproducible: $FIRST_SHA != $SECOND_SHA"
              exit 1
          fi

      - name: Upload reproducibility failure artifacts
        if: failure() && github.event_name != 'pull_request' && steps.repro.outputs.repro == 'fail'
        uses: actions/upload-artifact@v4
        with:
          name: shroud-${{ matrix.distro }}-repro-failure
          path: repro-failure/*
          if-no-files-found: ignore
          retention-days: 14

      - name: Verify exactly one artifact
        run: |
          COUNT=$(find out -maxdepth 1 -type f -name "*.${{ matrix.ext }}" | wc -l)
          if [ "$COUNT" -ne 1 ]; then
              echo "ERROR: expected exactly 1 .${{ matrix.ext }}, found $COUNT"
              ls -la out
              exit 1
          fi
          ARTIFACT=$(find out -maxdepth 1 -type f -name "*.${{ matrix.ext }}")
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: verify manifest sidecar
        env:
          ACTUAL: ${{ steps.ver.outputs.version }}
          EXT: ${{ matrix.ext }}
        run: |
          set -e
          artifact=$(ls out/*."${EXT}")
          manifest="${artifact}.manifest.json"
          if [ ! -f "$manifest" ]; then
            echo "::error::manifest sidecar missing: $manifest"
            exit 1
          fi

          msha=$(jq -r '.sha256'      "$manifest")
          mver=$(jq -r '.version'     "$manifest")
          mcom=$(jq -r '.git_commit'  "$manifest")
          mdis=$(jq -r '.distro'      "$manifest")

          asha=$(sha256sum "$artifact" | awk '{print $1}')

          fails=()
          [ "$msha" = "$asha"    ] || fails+=("manifest sha256 ($msha) != artifact sha256 ($asha)")
          [ "$mver" = "$ACTUAL"  ] || fails+=("manifest version ($mver) != Cargo.toml ($ACTUAL)")
          [ "$mdis" = "${{ matrix.distro }}" ] || fails+=("manifest distro ($mdis) != matrix distro (${{ matrix.distro }})")
          echo "$mcom" | grep -Eq '^[0-9a-f]{40}$' \
            || fails+=("manifest git_commit ($mcom) is not 40-char hex")

          if [ ${#fails[@]} -gt 0 ]; then
            echo "::error::manifest sidecar failed validation:"
            for f in "${fails[@]}"; do echo " - $f"; done
            exit 1
          fi
          echo "manifest OK: sha=$msha version=$mver distro=$mdis commit=$mcom"

      - name: Inspect .deb contents
        if: matrix.ext == 'deb'
        run: |
          echo "::group::dpkg-deb --info"
          dpkg-deb --info "$ARTIFACT"
          echo "::endgroup::"
          echo "::group::dpkg-deb --contents"
          dpkg-deb --contents "$ARTIFACT"
          echo "::endgroup::"

      - name: Inspect .rpm contents
        if: matrix.ext == 'rpm'
        run: |
          echo "::group::rpm -qip"
          rpm -qip "$ARTIFACT"
          echo "::endgroup::"
          echo "::group::rpm -qlp"
          rpm -qlp "$ARTIFACT"
          echo "::endgroup::"

      - name: smoke install (deb)
        if: matrix.ext == 'deb'
        run: |
          # Ubuntu/Debian slim base images ship /etc/dpkg/dpkg.cfg.d/excludes
          # which strips /usr/share/doc/* at install time. Real end-user
          # systems do not ship this exclude, so the package itself is
          # correct. Neutralise it for the CI smoke install only.
          rm -f /etc/dpkg/dpkg.cfg.d/excludes
          # --force-depends because runtime deps like network-manager are
          # not required to be present in the build container.
          dpkg -i --force-depends out/*.deb

      - name: smoke install (rpm)
        if: matrix.ext == 'rpm'
        run: |
          rpm -i --nodeps out/*.rpm

      - name: verify installed layout
        env:
          ACTUAL: ${{ steps.ver.outputs.version }}
          EXT: ${{ matrix.ext }}
        run: |
          FAILS=()
          fail() { FAILS+=("$1"); echo "FAIL: $1"; }
          ok()   { echo "OK:   $1"; }

          # -- Binary --
          if [ -x /usr/bin/shroud ]; then ok "/usr/bin/shroud exists and is executable"
          else fail "/usr/bin/shroud missing or not executable"; fi

          # -- Sudoers --
          if [ -f /etc/sudoers.d/shroud ]; then
            mode=$(stat -c %a /etc/sudoers.d/shroud)
            [ "$mode" = "440" ] && ok "/etc/sudoers.d/shroud mode 440" \
              || fail "/etc/sudoers.d/shroud mode is $mode, expected 440"
          else
            fail "/etc/sudoers.d/shroud missing"
          fi

          # -- Polkit + desktop --
          for f in \
            /usr/share/polkit-1/actions/com.shroud.killswitch.policy \
            /usr/share/applications/shroud.desktop
          do
            [ -f "$f" ] && ok "$f" || fail "$f missing"
          done

          # -- Systemd unit + dev-path regression guard --
          UNIT=""
          for cand in /lib/systemd/system/shroud.service /usr/lib/systemd/system/shroud.service; do
            [ -f "$cand" ] && UNIT="$cand" && break
          done
          if [ -z "$UNIT" ]; then
            fail "shroud.service not found in /lib or /usr/lib systemd dirs"
          else
            ok "shroud.service at $UNIT"
            if grep -q '/usr/local/bin/shroud' "$UNIT"; then
              fail "regression: $UNIT references /usr/local/bin/shroud (dev-only path)"
            else
              ok "$UNIT does not reference /usr/local/bin"
            fi
          fi

          # -- Docs --
          for d in /usr/share/doc/shroud/README.md /usr/share/doc/shroud/changelog.gz; do
            [ -f "$d" ] && ok "$d" || fail "$d missing"
          done
          if [ "$EXT" = "deb" ]; then
            [ -f /usr/share/doc/shroud/copyright ] && ok "/usr/share/doc/shroud/copyright" \
              || fail "/usr/share/doc/shroud/copyright missing (Debian policy)"
          else
            [ -f /usr/share/doc/shroud/LICENSE ] && ok "/usr/share/doc/shroud/LICENSE" \
              || fail "/usr/share/doc/shroud/LICENSE missing"
          fi

          # -- Runtime smoke --
          if [ -x /usr/bin/shroud ]; then
            /usr/bin/shroud --help >/dev/null 2>&1 && ok "shroud --help exited 0" \
              || fail "shroud --help failed"
          fi

          echo
          if [ ${#FAILS[@]} -eq 0 ]; then
            echo "installed-layout check passed."
          else
            echo "::error::installed-layout check found ${#FAILS[@]} failure(s):"
            for f in "${FAILS[@]}"; do echo " - $f"; done
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shroud-${{ matrix.distro }}-${{ matrix.ext }}
          path: |
            out/*.${{ matrix.ext }}
            out/*.${{ matrix.ext }}.manifest.json
          if-no-files-found: error
          retention-days: 14

  # =========================================================================
  # Aggregate gate. Single required check for branch protection.
  # =========================================================================
  pkg-success:
    name: pkg-build success
    needs: [lint, input-tests, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: verify all dependencies succeeded
        run: |
          lint_r='${{ needs.lint.result }}'
          inp_r='${{ needs.input-tests.result }}'
          bld_r='${{ needs.build.result }}'
          echo "lint=$lint_r input-tests=$inp_r build=$bld_r"
          rc=0
          if [ "$lint_r" != "success" ]; then
            echo "::error::lint job did not succeed ($lint_r)"; rc=1
          fi
          if [ "$inp_r" != "success" ]; then
            echo "::error::input-tests job did not succeed ($inp_r)"; rc=1
          fi
          if [ "$bld_r" != "success" ]; then
            echo "::error::build job did not succeed ($bld_r)"; rc=1
          fi
          exit "$rc"
