name: Extended CI

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_perf:
        description: 'Run performance tests'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  COVERAGE_FLOOR: 50
  BINARY_SIZE_CEILING: 15728640

# Cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Coverage (only in extended CI, not regular CI)
  # ===========================================================================
  
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v4"
      
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Pre-cleanup
        run: timeout 5 pkill -9 shroud 2>/dev/null || true
      
      - name: Generate coverage
        run: |
          timeout 600 cargo tarpaulin \
            --bins \
            --out xml --out html \
            --output-dir coverage \
            --timeout 120 \
            --exclude-files "tests/e2e/*" \
            --exclude-files "tests/e2e.rs" \
            --exclude-files "tests/chaos/*" \
            --exclude-files "tests/chaos.rs" \
            --skip-clean \
            -- --test-threads=2 2>&1 | tee coverage/tarpaulin.log || echo "Tarpaulin completed"
        continue-on-error: true

      - name: Post-cleanup
        if: always()
        run: timeout 5 pkill -9 shroud 2>/dev/null || true
      
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
      
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ===========================================================================
  # Binary Size Tracking
  # ===========================================================================
  
  binary-size:
    name: Binary Size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config bc
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v4"
      
      - name: Build release
        run: cargo build --release
      
      - name: Check binary size
        run: |
          SIZE=$(stat -c%s target/release/shroud)
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Binary size: ${SIZE_MB} MB (${SIZE} bytes)"
          
          if [[ $SIZE -gt ${{ env.BINARY_SIZE_CEILING }} ]]; then
            echo "⚠️ Binary size exceeds ceiling of ${{ env.BINARY_SIZE_CEILING }} bytes"
          else
            echo "✅ Binary size is within limits"
          fi

  # ===========================================================================
  # Performance Smoke (optional, on push to main or manual trigger)
  # ===========================================================================
  
  perf-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' || github.event.inputs.run_perf == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v4"
      
      - name: Install hyperfine
        run: |
          wget -q https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
          sudo dpkg -i hyperfine_1.18.0_amd64.deb
      
      - name: Build release
        run: cargo build --release
      
      - name: Run performance smoke
        run: |
          echo "=== CLI Help Performance ==="
          hyperfine --warmup 3 --runs 10 'target/release/shroud --help'
          
          echo "=== CLI Version Performance ==="
          hyperfine --warmup 3 --runs 10 'target/release/shroud --version'

  # ===========================================================================
  # Summary
  # ===========================================================================
  
  extended-ci-success:
    name: Extended CI Success
    needs: [coverage, binary-size]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Coverage: ${{ needs.coverage.result }}"
          echo "Binary Size: ${{ needs.binary-size.result }}"
          
          # Coverage is allowed to fail (can be flaky)
          if [[ "${{ needs.binary-size.result }}" == "failure" ]]; then
            echo "Binary size check failed"
            exit 1
          fi
          
          echo "✅ Extended CI checks completed!"
